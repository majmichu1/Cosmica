name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with build

      - name: Build with PyInstaller
        run: |
          poetry run pyinstaller build/linux/cosmica.spec
          cd dist && tar czf cosmica-linux-x86_64.tar.gz cosmica/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosmica-linux
          path: dist/cosmica-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          (Invoke-WebRequest -Uri https://install.python-poetry.org -UseBasicParsing).Content | python -
          echo "$env:APPDATA\Python\Scripts" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with build

      - name: Build with PyInstaller
        run: |
          poetry run pyinstaller build/windows/cosmica.spec
          cd dist && Compress-Archive -Path cosmica -Destination cosmica-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosmica-windows
          path: dist/cosmica-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with build

      - name: Build with PyInstaller
        run: |
          poetry run pyinstaller build/macos/cosmica.spec
          cd dist && tar czf cosmica-macos-arm64.tar.gz cosmica/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosmica-macos
          path: dist/cosmica-macos-arm64.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cosmica-linux/cosmica-linux-x86_64.tar.gz
            cosmica-windows/cosmica-windows.zip
            cosmica-macos/cosmica-macos-arm64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
