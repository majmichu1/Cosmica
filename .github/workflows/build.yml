name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONOPTIMIZE: 1

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "C:\Program Files\dotnet" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft SQL Server" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Microsoft SDKs" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:USERPROFILE\.nuget" -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CPU-only torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu --no-cache-dir

      - name: Install Poetry
        run: pip install --no-cache-dir poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install PyInstaller
        run: pip install --no-cache-dir pyinstaller

      - name: Build Windows exe
        run: pyinstaller cosmica.spec --clean --noconfirm

      - name: Zip dist folder
        shell: pwsh
        run: Compress-Archive -Path dist\Cosmica -DestinationPath Cosmica-windows-x64.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Cosmica-windows-x64.zip
